on:
  push:
    tags:
      - 'testing_*'

name: Testing Release

jobs:
  release:
    name: Testing Release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v2
        with:
          submodules: recursive
          token: ${{ secrets.RELEASE }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '10.x.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/stg/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev\"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: |
          $ver = '${{ github.ref }}' -replace 'refs/tags/testing_',''
          dotnet build --no-restore -c Release --nologo -p:Version=$ver

      - name: Write version into manifest
        run: |
          $ver = '${{ github.ref }}' -replace 'refs/tags/testing_',''
          $path = './DragAndDropTexturing/bin/x64/Release/DragAndDropTexturing.json'
          $content = get-content -path $path
          $content = $content -replace '0.0.0.0',$ver
          set-content -Path $path -Value $content

      - name: Packing Release
        run: |
          pushd DragAndDropTexturing/bin/x64/Release/
          7z a ../DragAndDropTexturing.zip *
          popd
        shell: bash

      - name: Create Release
        uses: ncipollo/release-action@v1.12.0
        with:
          name: DragAndDropTexturing ${{ github.ref_name }} (Testing)
          artifacts: "./DragAndDropTexturing/bin/x64/*.zip"
          tag: ${{ github.ref_name }}
          prerelease: true
          body: "⚠️ **Testing build** — opt-in via Dalamud settings (/xlsettings → Experimental → Get plugin testing builds). Do not install manually."
          omitBodyDuringUpdate: true
          allowUpdates: true
          replacesArtifacts: true
          token: ${{ secrets.RELEASE }}

      - name: Write out repo.json
        run: |
          $ver = '${{ github.ref_name }}' -replace 'testing_',''
          $tag = '${{ github.ref_name }}'
          $path = './repo.json'
          $json = Get-Content -Raw $path | ConvertFrom-Json
          $json[0].TestingAssemblyVersion = $ver
          $json[0].DownloadLinkTesting = "https://github.com/Sebane1/DragAndDropTexturing/releases/download/$tag/DragAndDropTexturing.zip"
          $content = ConvertTo-Json @($json) -Depth 10
          set-content -Path $path -Value $content

      - name: Commit repo.json
        run: |
          git config --global user.name "Actions User"
          git config --global user.email "actions@github.com"
          git fetch origin master
          git branch -f master ${{ github.sha }}
          git checkout master
          git add repo.json
          git commit -m "[CI] Updating repo.json for testing build ${{ github.ref_name }}" || true
          git push origin master
